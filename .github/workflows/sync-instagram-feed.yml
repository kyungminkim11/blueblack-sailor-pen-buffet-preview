name: Sync Instagram Feed

on:
  schedule:
    - cron: '17 */3 * * *'
      timezone: 'Asia/Seoul'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Instagram API secret
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: |
          if [ -z "$INSTAGRAM_ACCESS_TOKEN" ]; then
            echo "::error::Repository secret INSTAGRAM_ACCESS_TOKEN is not configured."
            exit 1
          fi

      - name: Fetch latest Instagram posts
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCOUNT_USERNAME: blueblack_korea
          INSTAGRAM_ITEM_LIMIT: 9
        run: node scripts/update-instagram-feed.mjs

      - name: Commit feed changes
        id: changes
        run: |
          git add news/feed-data.json news/instagram-cache

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Instagram feed is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update Instagram feed"
          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload updated site
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy updated site
        if: steps.changes.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
