name: Validate static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            temp_file="$(mktemp --suffix=.mjs)"
            cp "$file" "$temp_file"
            node --check "$temp_file"
            rm -f "$temp_file"
          done < <(find . -type f \( -name '*.js' -o -name '*.mjs' \) -not -path './node_modules/*' -print0)

      - name: Check required public pages
        shell: bash
        run: |
          set -euo pipefail
          required=(
            index.html
            404.html
            pen-buffet/index.html
            store-guide/index.html
            official-guide/index.html
            ink-price/index.html
            engraving-guide/index.html
            as-guide/index.html
            review-event/index.html
            news/index.html
          )
          for file in "${required[@]}"; do
            test -s "$file" || { echo "Missing required page: $file"; exit 1; }
          done

      - name: Check shared UX assets
        shell: bash
        run: |
          set -euo pipefail
          test -s src/global-ux-v60.js
          test -s src/global-ux-v60.css
          test -s src/pen-model-glb-v60.js
          grep -q "global-ux-v60.js" src/public-ui-v52.js
          grep -q "pen-model-glb-v60.js" src/app-v12.js
