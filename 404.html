<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10233f" />
  <meta name="robots" content="noindex, nofollow" />
  <title>페이지를 찾을 수 없습니다 · BlueBlack Pen Shop</title>
  <link rel="icon" href="./app-icon.svg" type="image/svg+xml" />
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#eef2f6;color:#10233f;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(620px,100%);padding:clamp(26px,6vw,48px);border:1px solid #d4dee8;border-radius:28px;background:#fff;box-shadow:0 22px 70px rgba(16,35,63,.1)}.mark{display:grid;place-items:center;width:68px;height:68px;border-radius:20px;background:#10233f;color:#fff;font-size:25px;font-weight:950}.kicker{display:block;margin-top:24px;color:#a77a3d;font-size:11px;font-weight:950;letter-spacing:.12em}.card h1{margin:8px 0 0;font-size:clamp(30px,7vw,48px);letter-spacing:-.05em}.card p{margin:14px 0 0;color:#637186;font-size:15px;line-height:1.75}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}.actions a{display:inline-flex;align-items:center;justify-content:center;min-height:50px;padding:0 17px;border:1px solid #d4dee8;border-radius:13px;background:#fff;color:#10233f;font-size:14px;font-weight:900;text-decoration:none}.actions a.primary{border-color:#10233f;background:#10233f;color:#fff}@media(max-width:520px){.actions{display:grid}.actions a{width:100%}}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">BB</div>
    <span class="kicker">PAGE NOT FOUND</span>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>주소가 변경되었거나 잘못 입력된 것 같습니다. 디지털 가이드 홈에서 필요한 안내를 다시 선택해 주세요.</p>
    <div class="actions">
      <a class="primary" href="./">디지털 가이드 홈</a>
      <a href="./pen-buffet/">펜뷔페 미리보기</a>
      <a href="./store-guide/">매장 안내</a>
    </div>
  </main>
</body>
</html>
