name: Repair v12 renderer syntax

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-app-v12.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repair ternary expressions
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/app-v12.js')
          text = path.read_text()
          replacements = {
              "color.transparent?.93:1": "color.transparent ? .93 : 1",
              "highlight?.12:0": "highlight ? .12 : 0",
              "dark?.08:(color.metalness??.9)": "dark ? .08 : (color.metalness??.9)",
              "dark?.38:(color.roughness??.2)": "dark ? .38 : (color.roughness??.2)",
              "highlight&&!dark?.14:0": "highlight&&!dark ? .14 : 0",
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text)
          PY
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app-v12.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Repair v12 renderer syntax"
          git push
