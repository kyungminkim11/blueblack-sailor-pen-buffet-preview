name: Audit public responsive UI

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'news/**'
      - 'review-event/**'
      - 'pen-buffet/**'
      - 'store-guide/**'
      - 'official-guide/**'
      - 'engraving-guide/**'
      - 'as-guide/**'
      - 'ink-price/**'
      - 'admin.html'
      - 'admin/**'
      - 'src/**'
      - 'qa/**'
      - 'scripts/audit-responsive.mjs'
      - 'scripts/audit-release.mjs'
      - 'scripts/audit-admin-security.mjs'
      - 'scripts/validate-public-ui.mjs'
      - '.github/workflows/audit-public-responsive.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate public page connections
        run: node scripts/validate-public-ui.mjs
      - name: Install Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Start local site
        run: |
          python3 -m http.server 4173 > /tmp/blueblack-http.log 2>&1 &
          echo $! > /tmp/blueblack-http.pid
          sleep 2
      - name: Test desktop tablet and mobile layouts
        run: AUDIT_BASE_URL=http://127.0.0.1:4173 node scripts/audit-responsive.mjs
      - name: Test public interactions and release integrity
        run: AUDIT_BASE_URL=http://127.0.0.1:4173 node scripts/audit-release.mjs
      - name: Test internal route access gates
        run: AUDIT_BASE_URL=http://127.0.0.1:4173 node scripts/audit-admin-security.mjs
      - name: Test extended mobile routes and 360 controls
        run: QA_BASE_URL=http://127.0.0.1:4173 node qa/responsive-smoke.mjs
      - name: Stop local site
        if: always()
        run: |
          if test -f /tmp/blueblack-http.pid; then kill "$(cat /tmp/blueblack-http.pid)" || true; fi
      - name: Upload responsive screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: responsive-audit-screenshots
          path: |
            artifacts/responsive
            artifacts/release-audit
            artifacts/admin-security-audit
            qa-artifacts/responsive
          if-no-files-found: ignore
          retention-days: 7
