<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, follow" />
  <title>매장 안내로 이동 중</title>
  <script>
    (function(){
      var params=new URLSearchParams(location.search);
      var floor=params.get('floor')==='2'?'2':'1';
      var lang=params.get('lang');
      var target='../store-guide/?floor='+floor+(lang?'&lang='+encodeURIComponent(lang):'')+'#floor-guide';
      location.replace(target);
    })();
  </script>
</head>
<body>
  <p><a href="../store-guide/#floor-guide">통합 매장 안내 페이지로 이동</a></p>
  <script type="module" src="../src/portal-mobile-app.js?v=4"></script>
</body>
</html>
