name: Responsive smoke test

on:
  push:
    paths:
      - '**/*.html'
      - '**/*.css'
      - '**/*.js'
      - 'qa/responsive-smoke.mjs'
      - '.github/workflows/responsive-smoke.yml'
  workflow_dispatch:

jobs:
  responsive-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check enhancement syntax
        run: node --check src/store-guide-experience-v24.js

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start static server
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/blueblack-http.log 2>&1 &
          echo $! > /tmp/blueblack-http.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/blueblack-http.log
          exit 1

      - name: Run responsive checks
        env:
          QA_BASE_URL: http://127.0.0.1:4173
        run: node qa/responsive-smoke.mjs

      - name: Upload responsive screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: responsive-smoke-report
          path: qa-artifacts/responsive
          if-no-files-found: warn
