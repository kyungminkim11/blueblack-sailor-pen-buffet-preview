name: Apply public i18n completion

on:
  push:
    branches: [main]
    paths:
      - 'src/official-guide-i18n-v50.js'
      - 'src/engraving-guide-i18n-v50.js'
      - 'src/as-guide-i18n-v50.js'
      - 'src/pen-buffet-i18n-v50.js'
      - 'src/ink-price-i18n-completion-v50.js'
      - 'scripts/apply-public-i18n-completion.py'
      - '.github/workflows/apply-public-i18n-completion.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply multilingual page connections
        run: python scripts/apply-public-i18n-completion.py
      - name: Commit generated page updates
        run: |
          if git diff --quiet; then
            echo "No generated updates required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add official-guide/index.html engraving-guide/index.html as-guide/index.html pen-buffet/index.html ink-price/index.html src/detail-language.js .github/workflows/validate-platform.yml
          git commit -m "Connect complete public multilingual support"
          git push
