name: Fix synced ink catalog

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/fix_ink_catalog.py'
      - '.github/workflows/fix-ink-catalog.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fix-ink-catalog
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Normalize brand names and images
        run: python .github/scripts/fix_ink_catalog.py
      - name: Validate output
        run: node --check src/ink-store-colors-generated.js
      - name: Commit normalized catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ink-store-colors-generated.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Normalize synced ink catalog"
          git push
