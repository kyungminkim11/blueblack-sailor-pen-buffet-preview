<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">블루블랙 펜샵 내부 브랜드 위치도</title>
  <desc id="desc">오른쪽 출입문과 카운터를 기준으로 벽면 및 중앙 진열대의 브랜드 위치를 표시한 고객용 매장 지도</desc>
  <style>
    :root{color-scheme:light}
    text{font-family:Pretendard,"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#17263b;font-weight:750;pointer-events:none}
    .plan{fill:#fbfcfd;stroke:#10233f;stroke-width:2.5}
    .aisle{fill:#f6f8fa}
    .zone rect{stroke:#8d9bac;stroke-width:1.5;transition:opacity .18s ease,stroke .18s ease,filter .18s ease}
    .zone-brand rect{fill:#e8eef5}
    .zone-paper rect{fill:#eef2e8}
    .zone-table rect{fill:#f5ecdc}
    .zone-service rect{fill:#10233f;stroke:#10233f}
    .zone-service text{fill:#fff}
    .zone.is-dimmed{opacity:.2}
    .zone.is-match rect{stroke:#b67b24;stroke-width:5;filter:drop-shadow(0 0 7px rgba(182,123,36,.35))}
    .orientation{font-size:12px;fill:#66768b;font-weight:700}
    .north{font-size:11px;fill:#10233f;font-weight:900;letter-spacing:.08em}
    @media(prefers-reduced-motion:reduce){.zone rect{transition:none}}
  </style>
