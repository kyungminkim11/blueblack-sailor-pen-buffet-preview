name: Validate digital guide platform

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check JavaScript syntax
        run: |
          node --check src/public-ui-v52.js
          node --check scripts/validate-public-ui.mjs
          node --check src/portal.js
          node --check src/detail-language.js
          node --check src/public-portal-copy.js
          node --check news/news-feed.js
          node --check review-event/review-event.js
          node --check src/official-portal-addon.js
          node --check src/engraving-portal-addon.js
          node --check src/as-portal-addon.js
          node --check src/engraving-guide.js
          node --check src/as-guide.js
          node --check src/locale-ui-v10.js
          node --check src/store-address-addon.js
          node --check src/store-closing-notice.js
          node --check src/ink-price-style-v30-loader.js
          node --check src/portal-ink-live.js
          node --check src/official-guide-i18n-v50.js
          node --check src/engraving-guide-i18n-v50.js
          node --check src/as-guide-i18n-v50.js
          node --check src/pen-buffet-i18n-v50.js
          node --check src/ink-price-i18n-completion-v50.js
          node --check src/ink-products-data.js
          node --check src/ink-inventory-colors-v26-part1.js
          node --check src/ink-inventory-colors-v26-part2.js
          node --check src/ink-inventory-colors.js
          node --check src/ink-sample-colors-v24.js
          node --check src/ink-store-colors-generated.js
          node --check src/ink-waterproof-types-v27.js
          node --check src/ink-catalog-i18n-v22.js
          node --check src/ink-catalog-copy-patch-v23.js
          node --check src/ink-catalog-model-v22.js
          node --check src/ink-price-viewer.js
          node --check src/ink-price-search-v22.js
          node --check src/ink-price-ux-v19.js
          node --check src/app-v12.js
          node --check src/pwa-v9.js
          node --check src/part-guide-v11.js
          node --check src/store-recovery-v12.js
          node --check src/consultation-polish-v13.js
          node --check src/store-session-v12.js
          node --check src/store-actions-v12.js
          node --check admin/product-finder/catalog-db.js
          node --check admin/product-finder/catalog-utils.js
          node --check admin/product-finder/catalog-parser.js
          node --check admin/product-finder/catalog-search.js
          node --check admin/product-finder/product-finder-ui.js
          node --check admin/product-finder/product-finder-scan.js
          node --check admin/product-finder/product-finder.js
      - name: Validate public responsive and multilingual UI
        run: node scripts/validate-public-ui.mjs
      - name: Validate product finder CSV parser
        run: |
          printf '{"type":"module"}\n' > package.json
          node <<'NODE'
          import { buildProducts, parseCsv } from './admin/product-finder/catalog-parser.js';
          import { searchCatalog } from './admin/product-finder/catalog-search.js';
          const csv = '품목코드,품목그룹1명,품명 및 규격,재고수량,소비자가,판매가,재고 위치,적요\n123456,LAMY,라미 사파리 만년필 차콜 F,3,"54,000","43,200",2층,레이저 각인 가능';
          const products = buildProducts(parseCsv(csv));
          if (products.length !== 1) throw new Error('Product CSV parser failed');
          if (searchCatalog(products, '사파리').length !== 1) throw new Error('Product text search failed');
          if (searchCatalog(products, '123456').length !== 1) throw new Error('Product code search failed');
          NODE
      - name: Validate inventory-derived decant colors
        run: |
          printf '{"type":"module"}\n' > package.json
          node <<'NODE'
          import { INK_INVENTORY_COLORS } from './src/ink-inventory-colors.js';
          import { INK_PRODUCTS } from './src/ink-products-data.js';
          await import('./src/ink-waterproof-types-v27.js');
          const forbidden = /OMAS|오마스|카트리지|만년필|볼펜|샤프|프리젠터|트래블링|캘린더\s*20\d{2}/i;
          const keys = INK_INVENTORY_COLORS.map((item) => `${item.priceItemId}|${item.nameKo.toLocaleLowerCase()}`);
          const super5 = INK_PRODUCTS.find((item) => item.id === 'super5-standard');
          console.log(`Validated ${INK_INVENTORY_COLORS.length} decant ink colors`);
          if (INK_INVENTORY_COLORS.length < 1000) throw new Error('Too few inventory-derived decant colors');
          if (INK_INVENTORY_COLORS.some((item) => !item.priceItemId || !item.nameKo)) throw new Error('Missing series or color name');
          if (INK_INVENTORY_COLORS.some((item) => forbidden.test(`${item.brandKo} ${item.nameKo}`))) throw new Error('Non-decant product leaked into catalog');
          if (new Set(keys).size !== keys.length) throw new Error('Duplicate decant color entries');
          if (!super5?.keywords?.includes('피그먼트') || !super5.keywords.includes('방수')) throw new Error('SUPER5 waterproof classification missing');
          NODE
      - name: Check platform pages and source assets
        run: |
          test -f index.html
          test -f news/index.html
          test -f review-event/index.html
          test -f src/public-ui-v52.js
          test -f src/public-ui-v52.css
          test -f scripts/validate-public-ui.mjs
          test -f detail-language.css
          test -f admin/index.html
          test -f admin/admin.css
          test -f admin/product-finder/index.html
          test -f admin/product-finder/product-finder.css
          test -f admin/product-finder/product-finder.js
          test -f pen-buffet/index.html
          test -f store-guide/index.html
          test -f official-guide/index.html
          test -f engraving-guide/index.html
          test -f engraving-guide/engraving-guide.css
          test -f as-guide/index.html
          test -f ink-price/index.html
          test -f ink-price/ink-price.css
          test -f ink-price/ink-search.css
          test -f ink-price/ink-brand-catalog-v21.css
          test -f ink-price/ink-inventory-colors-v22.css
          test -f ink-price/ink-ux-v19.css
          test -f ink-price/source/price-list-1.png
          test -f ink-price/source/price-list-2.png
          test -f ink-price/source/price-list-3.png
          test -f ink-price/source/price-list-4.png
          test -f service/index.html
          test -f staff/index.html
          test -f pen-buffet/manifest.webmanifest
