name: Apply global mobile bottom bar

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-global-mobile-bottom-bar.mjs'
      - '.github/workflows/apply-global-mobile-bottom-bar.yml'

permissions:
  contents: write

concurrency:
  group: apply-global-mobile-bottom-bar
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply mobile navigation updates
        run: node scripts/apply-global-mobile-bottom-bar.mjs

      - name: Validate JavaScript
        run: |
          node --check src/portal-mobile-app.js
          node --check src/public-ui-v52.js

      - name: Commit generated changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/portal-mobile-app.js src/portal-mobile-app.css src/public-ui-v52.js sw.js '*.html' '**/*.html'
          git commit -m "feat: add mobile bottom bar across customer pages"
          git push origin HEAD:main
