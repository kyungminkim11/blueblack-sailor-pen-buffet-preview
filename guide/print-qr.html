<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>블루블랙 펜샵 고객용 가이드 QR</title><style>@page{size:A4;margin:0}*{box-sizing:border-box}body{margin:0;font-family:Pretendard,"Noto Sans KR",sans-serif;background:#d9d9d9;color:#0b1b31}.sheet{position:relative;width:210mm;min-height:297mm;margin:auto;background:#f5f1e9;overflow:hidden}.top{position:relative;height:118mm;background:linear-gradient(145deg,#071423,#15365b);color:#fff;padding:22mm 18mm}.top:after{content:"";position:absolute;right:-28mm;top:-16mm;width:115mm;height:115mm;border:1px solid rgba(255,255,255,.12);border-radius:50%}.brand{font-size:12px;font-weight:900;letter-spacing:.2em;color:#cbd7e4}.title{position:relative;z-index:2;font-family:Georgia,"Noto Serif KR",serif;font-size:30mm;line-height:.96;letter-spacing:-.07em;margin:20mm 0 0}.title em{font-style:normal;color:#e4cb91}.nib{position:absolute;right:18mm;bottom:-24mm;width:58mm;height:98mm;transform:rotate(-15deg);filter:drop-shadow(0 14px 16px rgba(0,0,0,.3))}.body{position:absolute;left:20mm;top:0;width:18mm;height:48mm;border-radius:9mm;background:linear-gradient(135deg,#2c527f,#071423)}.tip{position:absolute;left:10mm;top:38mm;width:38mm;height:56mm;background:linear-gradient(135deg,#fff0c0,#b58b43);clip-path:polygon(50% 100%,0 25%,20% 0,80% 0,100% 25%)}.tip:after{content:"";position:absolute;left:18.5mm;top:12mm;width:1mm;height:36mm;background:#72501d}.content{display:grid;grid-template-columns:1fr 78mm;gap:15mm;padding:18mm}.copy h2{font-family:Georgia,"Noto Serif KR",serif;font-size:15mm;line-height:1.08;letter-spacing:-.05em;margin:0 0 7mm}.copy p{font-size:5mm;line-height:1.7;color:#677383;margin:0}.steps{display:grid;gap:4mm;margin-top:10mm}.step{display:grid;grid-template-columns:9mm 1fr;align-items:center;gap:4mm}.step i{display:grid;place-items:center;width:9mm;height:9mm;border-radius:50%;background:#0b1b31;color:#fff;font-style:normal;font-weight:900;font-size:3.5mm}.step span{font-size:4mm;font-weight:800}.qr-card{align-self:start;background:#fff;border-radius:8mm;padding:8mm;box-shadow:0 8mm 20mm rgba(11,27,49,.12);text-align:center}.qr{width:62mm;height:62mm}.scan{margin-top:4mm;font-size:4mm;font-weight:900}.small{font-size:2.8mm;color:#7c8794;line-height:1.5;margin-top:2mm}.footer{position:absolute;left:18mm;right:18mm;bottom:10mm;padding-top:5mm;border-top:.4mm solid #d5d0c6;display:flex;justify-content:space-between;font-size:3mm;color:#667386}.print{position:fixed;right:16px;bottom:16px;border:0;border-radius:14px;background:#0b1b31;color:#fff;padding:13px 18px;font-weight:800}@media print{body{background:#fff}.sheet{margin:0}.print{display:none}}</style></head><body><main class="sheet"><section class="top"><div class="brand">BLUEBLACK PEN SHOP · FOUNTAIN PEN GUIDE</div><h1 class="title">첫 만년필을<br><em>잘 고르는 방법.</em></h1><div class="nib" aria-hidden="true"><div class="body"></div><div class="tip"></div></div></section><section class="content"><div class="copy"><h2>3분이면<br>준비됩니다.</h2><p>글씨 크기, 종이, 필압과 예산을 바탕으로 닙과 제품 후보를 정리해 드립니다.</p><div class="steps"><div class="step"><i>1</i><span>휴대전화 카메라로 QR 스캔</span></div><div class="step"><i>2</i><span>10문항 맞춤 추천 또는 검색</span></div><div class="step"><i>3</i><span>결과를 직원에게 보여주고 시필</span></div></div></div><div class="qr-card"><img class="qr" src="./qr.svg" alt="고객용 만년필 가이드 QR 코드"><div class="scan">SCAN TO START</div><div class="small">가격과 매장 재고는<br>최종적으로 직원에게 확인해 주세요.</div></div></section><footer class="footer"><span>서울 종로구 사직로 109</span><span>02-765-8868</span></footer></main><button class="print" onclick="window.print()">인쇄하기</button></body></html>
