  <style>
    .ink-app-boot{display:grid;place-items:center;min-height:240px;padding:24px;border:1px solid #ded5c7;border-radius:24px;background:#fff;color:#637186;text-align:center}
    .ink-app-boot strong{display:block;color:#10233f;font-size:18px}.ink-app-boot span{display:block;margin-top:6px;font-size:13px}
    html[data-ink-app="ready"] .ink-app-boot{display:none}.ink-loading,[data-ink-loading]{display:none!important}
  </style>

<body class="detail-shell ink-price-page">
  <header class="detail-header">
    <div class="detail-header-inner">
      <a class="detail-back" href="../" data-preserve-lang>← <span data-portal-t="back">디지털 가이드로 돌아가기</span></a>
      <h1 data-ink-title>소분 잉크 가격 검색</h1>
      <p data-ink-intro>소분 가능한 브랜드와 색상을 찾고, 5ml·10ml·본병 가격을 비교해 목록에 담아보세요.</p>
    </div>
  </header>

  <main class="ink-price-main">
    <section id="ink-store-app" aria-label="소분 잉크 가격 검색">
      <div class="ink-app-boot" role="status" aria-live="polite">
        <div><strong>소분 잉크 검색 화면을 준비하고 있습니다.</strong><span>브랜드·색상·가격 데이터를 불러오는 중입니다.</span></div>
      </div>
    </section>

    <details class="ink-notice-details">
      <summary data-store-notice-summary>소분 이용 전 확인해 주세요</summary>
      <section class="ink-notices" aria-label="Ink decant guidance"></section>
    </details>

    <details class="ink-original-details">
      <summary data-store-original-summary>전체 원본 가격표 보기</summary>
      <section class="ink-viewer" aria-label="Official ink price list viewer">
        <div class="ink-viewer-head">
          <div class="ink-tabs" role="tablist" aria-label="Price list pages"></div>
          <div class="ink-tools">
            <button type="button" class="ink-prev-page">← 이전</button>
            <button type="button" class="ink-next-page">다음 →</button>
            <button type="button" class="ink-zoom-out" aria-label="축소">−</button>
            <button type="button" class="ink-zoom-in" aria-label="확대">＋</button>
            <button type="button" class="ink-zoom-reset">화면 맞춤</button>
            <button type="button" class="ink-fullscreen">크게 보기</button>
            <button type="button" class="ink-share-page">현재 페이지 공유</button>
          </div>
        </div>
        <div class="ink-canvas"><img class="ink-sheet" alt="블루블랙 잉크 소분 가격표" decoding="async" /></div>
        <div class="ink-page-meta"><span><span data-ink-page-label>현재 페이지</span> · <strong data-ink-current>이용 안내</strong></span><span>5ml · 10ml</span></div>
      </section>
      <section class="ink-source">
        <b data-ink-source-label>원본 안내</b><br />
        <span data-ink-source-copy>가격과 소분 가능 여부는 변경될 수 있습니다. 결제 전 직원과 색상·용량·금액을 함께 확인해 주세요.</span>
        <div class="detail-actions"><a href="https://m.site.naver.com/25z4y" target="_blank" rel="noopener noreferrer">NAVER 원본 열기</a><a href="tel:027658868" data-portal-t="call">전화하기</a></div>
      </section>
    </details>
  </main>

  <dialog class="ink-image-dialog">
    <div class="ink-dialog-head"><strong>이용 안내</strong><button type="button" class="ink-dialog-close" aria-label="Close">×</button></div>
    <div class="ink-dialog-scroll"><img alt="Expanded ink price list" /></div>
  </dialog>
