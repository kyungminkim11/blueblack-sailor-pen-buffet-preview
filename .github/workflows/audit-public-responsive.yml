name: Audit public responsive UI

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'news/**'
      - 'review-event/**'
      - 'pen-buffet/**'
      - 'store-guide/**'
      - 'official-guide/**'
      - 'engraving-guide/**'
      - 'as-guide/**'
      - 'ink-price/**'
      - 'src/**'
      - 'scripts/audit-responsive.mjs'
      - 'scripts/validate-public-ui.mjs'
      - '.github/workflows/audit-public-responsive.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate public page connections
        run: node scripts/validate-public-ui.mjs
      - name: Install Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Test desktop tablet and mobile layouts
        run: |
          python3 -m http.server 4173 > /tmp/blueblack-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          AUDIT_BASE_URL=http://127.0.0.1:4173 node scripts/audit-responsive.mjs
      - name: Upload responsive screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: responsive-audit-screenshots
          path: artifacts/responsive
          if-no-files-found: ignore
          retention-days: 7
