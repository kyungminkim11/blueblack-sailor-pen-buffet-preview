name: Sync guide product images

on:
  workflow_dispatch:
  schedule:
    - cron: '20 18 * * 1'
  push:
    branches: [main]
    paths:
      - 'guide/data/catalog.js'
      - 'guide/data/premium.js'
      - 'guide/data/expanded-products.js'
      - 'guide/scripts/sync_product_images.py'
      - '.github/workflows/sync-guide-product-images.yml'
  pull_request:
    branches: [main]
    paths:
      - 'guide/data/catalog.js'
      - 'guide/data/premium.js'
      - 'guide/data/expanded-products.js'
      - 'guide/scripts/sync_product_images.py'
      - '.github/workflows/sync-guide-product-images.yml'
      - '.github/image-sync-trigger.md'

permissions:
  contents: write

concurrency:
  group: guide-product-image-sync-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out writable branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image sync dependencies
        run: python -m pip install --upgrade requests beautifulsoup4 pillow

      - name: Download and optimize official product images
        run: python guide/scripts/sync_product_images.py

      - name: Commit synchronized images
        shell: bash
        run: |
          if git diff --quiet -- guide/assets/products guide/data/product-images.js; then
            echo 'No image changes detected.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add guide/assets/products guide/data/product-images.js
          git commit -m 'Sync official BlueBlack product images'
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git push origin HEAD:"${BRANCH}"
