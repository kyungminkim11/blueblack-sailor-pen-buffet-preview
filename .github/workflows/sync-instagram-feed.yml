name: Sync Instagram feed

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */3 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-instagram-feed.yml'
      - 'scripts/update-instagram-feed.mjs'

permissions:
  contents: write

concurrency:
  group: instagram-feed-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check Instagram credentials
        id: credentials
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        shell: bash
        run: |
          if [ -n "$INSTAGRAM_ACCESS_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Instagram sync skipped: INSTAGRAM_ACCESS_TOKEN is not configured."
          fi

      - name: Fetch latest Instagram posts
        if: steps.credentials.outputs.configured == 'true'
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCOUNT_USERNAME: blueblack_korea
          INSTAGRAM_ITEM_LIMIT: '9'
        run: node scripts/update-instagram-feed.mjs

      - name: Commit updated feed
        if: steps.credentials.outputs.configured == 'true'
        shell: bash
        run: |
          if git diff --quiet -- news/feed-data.json news/instagram-cache; then
            echo "Instagram feed is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news/feed-data.json news/instagram-cache
          git commit -m "chore: refresh Instagram feed"
          git push origin HEAD:main
